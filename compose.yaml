# compose.yaml — SAKURA-II full-stack SITL launcher.
#
# Usage (single command):
#   make run          — build all images and start every service
#   make stop         — stop containers
#   make logs         — stream combined logs
#   make clean        — remove containers + volumes
#
# Service startup order:
#   cfs  →  ground_station ─┐
#        →  gazebo          →  ros2
#                            └─ fault_injector (after ground_station healthy)
#
# Ports exposed on the host:
#   10000/udp  — ground station UDP telemetry ingress
#   8080/tcp   — ground station operator UI  (http://localhost:8080)

services:

  # ── cFS stub ──────────────────────────────────────────────────────────────────
  # Emits 9 "App Initialized" lines (one per orbiter app) and then loops to
  # keep the container alive for healthcheck polling.  Full cFE runtime
  # requires submodule init — see HOW_TO_RUN.md §1 and Phase C.
  cfs:
    image: sakura/cfs:local
    container_name: sakura_cfs
    build:
      context: .
      dockerfile: .ci/cfs.Dockerfile
    volumes:
      - ./build_cfs:/app/build_cfs:ro
      - cfs_logs:/tmp/cfs
    command: >
      bash -c "
        mkdir -p /tmp/cfs/log &&
        /app/build_cfs/cpu1/core-cpu1 2>&1 | tee /tmp/cfs/log/cfs_es_startup.log
      "
    networks:
      - sakura-net
    healthcheck:
      test: ["CMD", "grep", "-c", "App Initialized", "/tmp/cfs/log/cfs_es_startup.log"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Gazebo Harmonic ───────────────────────────────────────────────────────────
  # Runs gz sim with mars_surrogate.sdf (Mars gravity, flat terrain,
  # rover/UAV/cryobot models).  Plugin .so files are compiled into the image
  # by the multi-stage gazebo.Dockerfile (Phase A).
  # GZ_IP and GZ_PARTITION must match the ros2 service for gz-transport peer
  # discovery to work across Docker bridge network containers (Phase B).
  #
  # GUI: the command detects $$DISPLAY at runtime.
  #   With display (make run on a desktop): opens the full Gazebo 3D window.
  #   Without display (CI / headless server): runs server-only (-s flag).
  # LIBGL_ALWAYS_SOFTWARE forces Mesa llvmpipe — no GPU passthrough required.
  # The /tmp/.X11-unix bind-mount forwards the host X11 socket into the container.
  gazebo:
    image: sakura/gazebo:local
    container_name: sakura_gazebo
    build:
      context: .
      dockerfile: .ci/gazebo.Dockerfile
    volumes:
      - ./simulation:/app/simulation:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c "
        if [ -n \"$$DISPLAY\" ]; then
          gz sim -r /app/simulation/worlds/mars_surrogate.sdf;
        else
          gz sim -r -s /app/simulation/worlds/mars_surrogate.sdf;
        fi
      "
    environment:
      - DISPLAY
      - GZ_IP=gazebo
      - GZ_PARTITION=sakura
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_GL_VERSION_OVERRIDE=3.3
    networks:
      - sakura-net
    depends_on:
      cfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'gz sim' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Space ROS 2 ───────────────────────────────────────────────────────────────
  # Builds the rover workspace with colcon, then launches via sim.launch.py
  # which starts ros_gz_bridge (bridging /cmd_vel and odometry) and teleop_node.
  # use_external_gz:=true skips launching a second gz sim process — the gazebo
  # service above already owns the physics server.
  # Set LAUNCH_MODE=rover to fall back to rover.launch.py (no bridge, no Gazebo).
  ros2:
    image: sakura/ros2:local
    container_name: sakura_ros2
    build:
      context: .
      dockerfile: .ci/ros2.Dockerfile
    volumes:
      - ./ros2_ws:/workspace/ros2_ws:ro
    command: >
      bash -c "
        source /opt/ros/spaceros/setup.bash &&
        cd /workspace &&
        colcon build --base-paths ros2_ws/src --symlink-install &&
        source install/setup.bash &&
        ros2 launch rover_bringup ${LAUNCH_MODE:-sim}.launch.py use_external_gz:=true
      "
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - GZ_IP=gazebo
      - GZ_PARTITION=sakura
      - LAUNCH_MODE=sim
    networks:
      - sakura-net
    depends_on:
      gazebo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f teleop_node || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ── Rust ground station ───────────────────────────────────────────────────────
  # Builds the Cargo workspace inside the container (layer-cached after the
  # first run) and starts the ground station.
  #
  # Ports:
  #   10000/udp — CCSDS AOS frame ingress from cFS / fault_injector
  #   8080/tcp  — operator UI (all 7 telemetry surfaces + /api/tc)
  ground_station:
    image: sakura/ground_station:local
    container_name: sakura_ground_station
    build:
      context: .
      dockerfile: .ci/ground_station.Dockerfile
    command: >
      bash -c "
        cd /app &&
        cargo build -p ground_station --release &&
        RUST_LOG=info ./target/release/ground_station 0.0.0.0:10000
      "
    ports:
      - "10000:10000/udp"
      - "8080:8080/tcp"
    networks:
      - sakura-net
    depends_on:
      cfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ss -ulnp | grep -q ':10000' || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Fault injector ────────────────────────────────────────────────────────────
  # Builds fault_injector_run from source inside Docker (no host build needed),
  # then sends SCN-OFF-01-clockskew scenario to the ground station.
  # Runs once (restart: "no") and exits after 30 s of injection.
  fault_injector:
    image: sakura/fault_injector:local
    container_name: sakura_fault_injector
    build:
      context: .
      dockerfile: .ci/fault_injector.Dockerfile
    volumes:
      - ./simulation/scenarios:/app/scenarios:ro
    command: >
      fault_injector_run
        ground_station
        10000
        /app/scenarios/SCN-OFF-01-clockskew.yaml
        30
    networks:
      - sakura-net
    depends_on:
      cfs:
        condition: service_healthy
      ground_station:
        condition: service_healthy
    restart: "no"

networks:
  sakura-net:
    driver: bridge

volumes:
  cfs_logs:
