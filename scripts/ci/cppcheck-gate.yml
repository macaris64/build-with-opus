# MISRA cppcheck gate — CI stub.
# Wired into the full GitHub Actions workflow in Phase 49.
# Run locally with: act -j cppcheck
name: MISRA cppcheck gate
on:
  push:
    paths:
      - 'apps/**'
      - '_defs/**'
      - 'scripts/cppcheck-gate.sh'
      - 'cppcheck-baseline.txt'
  pull_request:
    paths:
      - 'apps/**'
      - '_defs/**'
      - 'scripts/cppcheck-gate.sh'
      - 'cppcheck-baseline.txt'
jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck
      - name: Run MISRA baseline gate
        run: bash scripts/cppcheck-gate.sh
